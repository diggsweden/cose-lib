name: OpenSSF Scorecard Analysis
on:
  schedule:
    # Saturdays at 01:40 UTC
    - cron: "40 1 * * 6"
    # Wednesdays at 01:40 UTC
    - cron: "40 1 * * 3"
  workflow_dispatch:

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@3f8f8b2b29b7524d81bf7707261cdb13533f6d25 # feat/write-security-events-with-token
    with:
      publish-results: true
      reusable-ci-ref: feat/write-security-events-with-token
