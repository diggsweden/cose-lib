name: OpenSSF Scorecard Analysis
on:
  schedule:
    # Saturdays at 01:40 UTC
    - cron: "40 1 * * 6"
    # Wednesdays at 01:40 UTC
    - cron: "40 1 * * 3"
  workflow_dispatch:

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@c05880c429c91786427337cf06853c041d1f729f # v2.7.4
    with:
      publish-results: true
