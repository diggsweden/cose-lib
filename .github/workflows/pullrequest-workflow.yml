name: Pull Request Workflow

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feature/**'

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@3f8f8b2b29b7524d81bf7707261cdb13533f6d25 # feat/write-security-events-with-token
    secrets: inherit
    permissions:
      contents: read
      packages: read
    with:
      reusable-ci-ref: feat/write-security-events-with-token
      project-type: maven
      # Use devbase-check linting (replaces megalint, commitlint, licenselint)
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false

  test:
    needs: [pr-checks]
    if: always() # Run tests even if linting fails (get complete feedback)
    permissions:
      contents: read # Access test resources and source code
      packages: read # Fetch test dependencies from GitHub Packages
    uses: ./.github/workflows/test.yml
